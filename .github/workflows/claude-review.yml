name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    environment: ai-review
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This is ChokoFactory, a Rust workspace (chokofactoryd daemon,
            choco CLI, chokofactory-core shared types).

            Start with `gh pr diff` and treat it as your primary source -
            review the changed lines themselves first. Only read other
            repository files when you need context a diff hunk alone
            doesn't give you (e.g. a called function's definition, an
            existing test's conventions, a struct's other fields) - don't
            do open-ended exploration of unrelated parts of the repo.

            This is your only review pass for this diff, so be exhaustive
            rather than stopping after the first few findings: work
            through every changed function systematically and report
            everything you find in this single pass, including issues of
            the same kind you've already found once (e.g. if one function
            drops an error silently, check whether sibling functions do
            too). Pay particular attention to concurrency/async
            correctness (shared state, lock scope, task lifecycles) given
            this codebase's tokio-based design - that's historically
            where the real bugs have been. Also check:
            - Correctness and potential bugs
            - Security issues
            - Consistency with existing conventions in the codebase
            - Missing or weak test coverage

            The PR branch is already checked out in the current working
            directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) to highlight specific lines.
            Only post GitHub comments - don't submit review text as
            regular messages.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
